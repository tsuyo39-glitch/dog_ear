<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dog_ear - Create Note</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        background: transparent;
        font-family: system-ui, -apple-system, sans-serif;
      }

      .splash-container {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .add-button {
        position: relative;
        width: 64px;
        height: 64px;
        border: 0;
        border-radius: 50%;
        color: #fffdf8;
        background: #3d352c;
        font-size: 0;
        line-height: 0;
        cursor: pointer;
        box-shadow: 0 14px 34px rgba(67, 56, 43, 0.16);
        transition: transform 0.1s ease;
        display: grid;
        place-items: center;
      }

      .add-button::before,
      .add-button::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        width: 28px;
        height: 6px;
        border-radius: 999px;
        background: currentColor;
        transform: translate(-50%, -50%);
      }

      .add-button::after {
        transform: translate(-50%, -50%) rotate(90deg);
      }

      .add-button:hover {
        transform: translateY(-1px);
      }

      .add-button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div class="splash-container">
      <button class="add-button" id="addButton" type="button" aria-label="付箋を追加">+</button>
    </div>

    <script src="splash.js"></script>
  </body>
</html>
