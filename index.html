<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>dog_ear</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="board" id="board" aria-label="付箋ボード">
      <div class="empty-state" id="emptyState">
        <h1>dog_ear</h1>
        <p>右下の＋から付箋を追加できます。</p>
      </div>
    </main>

    <button class="add-button" id="addButton" type="button" aria-label="付箋を追加">+</button>

    <template id="noteTemplate">
      <article class="note" data-note-id="">
        <div class="note-toolbar" data-drag-handle>
          <select class="shape-select" aria-label="動物の形">
            <option value="dog">犬</option>
            <option value="cat">猫</option>
            <option value="bear">くま</option>
            <option value="rabbit">うさぎ</option>
            <option value="frog">かえる</option>
            <option value="chick">ひよこ</option>
            <option value="panda">パンダ</option>
            <option value="hedgehog">ハリネズミ</option>
            <option value="koala">コアラ</option>
            <option value="penguin">ペンギン</option>
          </select>
          <button class="delete-button" type="button" aria-label="付箋を削除">×</button>
        </div>

        <svg class="note-shape" viewBox="0 0 260 230" aria-hidden="true" focusable="false">
          <path class="note-shape-fill" d="" />
          <path class="note-shape-outline" d="" />
        </svg>

        <textarea class="note-text" aria-label="付箋本文" placeholder="メモ"></textarea>
        <div class="palette" aria-label="付箋カラー"></div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
